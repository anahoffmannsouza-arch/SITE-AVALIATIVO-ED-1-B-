<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTech AI - O Futuro da Aprendizagem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav aria-label="Menu Principal">
            <div class="logo">EduTech<span>AI</span></div>
            <ul class="nav-links">
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#recursos">Recursos</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
            <div class="accessibility-controls">
                <button id="btn-contrast" aria-label="Alternar Alto Contraste">🌓</button>
                <button id="btn-font-up" aria-label="Aumentar Fonte">A+</button>
                <button id="btn-font-down" aria-label="Diminuir Fonte">A-</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero" aria-labelledby="hero-title">
            <h1 id="hero-title">Transformando a Educação com IA</h1>
            <p>Soluções personalizadas para alunos e professores.</p>
            <button class="cta-button">Começar Agora</button>
        </section>

        <section id="recursos" aria-labelledby="recursos-title">
            <h2 id="recursos-title" class="reveal">Nossas Soluções</h2>
            <div id="cards-container" class="grid-container">
                </div>
        </section>

        <section id="faq" aria-labelledby="faq-title">
            <h2 id="faq-title" class="reveal">Dúvidas Frequentes</h2>
            <div class="accordion" id="accordion-group">
                </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 EduTech AI. Acessibilidade em primeiro lugar.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
