
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTech AI - Inovação na Aprendizagem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav aria-label="Navegação principal">
            <div class="logo">EduTech<span>AI</span></div>
            <div class="accessibility-controls">
                <button id="btn-contrast" title="Alto Contraste">🌓</button>
                <button id="btn-font-up" title="Aumentar Fonte">A+</button>
                <button id="btn-font-down" title="Diminuir Fonte">A-</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Educação Inteligente</h1>
            <p>Personalizando o futuro do conhecimento com IA.</p>
        </section>

        <section id="recursos" class="grid-container">
            </section>

        <section class="split-section reveal">
            <div class="text-box">
                <h2>Por que IA na Educação?</h2>
                <p>A IA permite que cada aluno tenha um tutor disponível 24h, adaptando o conteúdo para diferentes estilos de aprendizagem e níveis de dificuldade.</p>
            </div>
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1501504905252-473c47e087f8?auto=format&fit=crop&q=80&w=600" alt="Estudante estudando">
            </div>
        </section>
    </main>

    <footer><p>&copy; 2024 EduTech AI - UX & Acessibilidade</p></footer>
    <script src="script.js"></script>
</body>
</html>
